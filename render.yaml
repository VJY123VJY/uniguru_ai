services:
  - type: web
    name: uniguru-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: /app/backend
      - key: UNIGURU_HOST
        value: 0.0.0.0
      - key: UNIGURU_PORT
        value: 8000
      - key: UNIGURU_OLLAMA_ENABLED
        value: true
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: UNIGURU_EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: UNIGURU_KB_CONFIDENCE_THRESHOLD
        value: "0.30"
      - key: UNIGURU_KB_CONFIDENCE_MIN
        value: "0.30"
      - key: UNIGURU_LOG_LEVEL
        value: INFO
      - key: UNIGURU_API_AUTH_REQUIRED
        value: false
    disk:
      name: uniguru-rag-data
      mountPath: /app/backend/RAG
      sizeGB: 1
